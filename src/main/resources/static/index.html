<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rag Text</title>

    <!-- Bebas Neue font -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f1115;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            margin-top: 40px;
            letter-spacing: 2px;
        }

        .title span {
            font-weight: bold;
        }

        .input-row {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prompt-box {
            width: 400px;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #2a2f3a;
            background: #161a22;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .spy-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #1f6feb;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .spy-btn:hover {
            background: #2b82ff;
            transform: scale(1.05);
        }

        .spy-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .output-box {
            margin-top: 30px;
            width: 470px;
            min-height: 200px;
            background: #161a22;
            border: 1px solid #2a2f3a;
            border-radius: 10px;
            padding: 15px;
            white-space: pre-wrap;
        }
        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 170px;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 5px solid #2a2f3a;
            border-top: 5px solid #1f6feb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

<div class="title">
    <span>RAG TEST</span>
</div>

<div class="input-row">
    <input class="prompt-box" id="prompt" placeholder="Enter your prompt..." />

    <button class="spy-btn" onclick="submitPrompt()">
        <!-- spyglass icon -->
        <svg viewBox="0 0 24 24">
            <path d="M10 2a8 8 0 105.293 14.293l4.707 4.707 1.414-1.414-4.707-4.707A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/>
        </svg>
    </button>
</div>

<div class="output-box" id="output">
    Output will appear here...
</div>

<script>
    async function submitPrompt() {
        const prompt = document.getElementById("prompt").value.trim();
        const output = document.getElementById("output");

        if (!prompt) {
            output.textContent = "Please enter a prompt.";
            return;
        }

        // Spinner while waiting
        output.innerHTML = `
            <div class="spinner-container">
                <div class="spinner"></div>
            </div>
        `;

        try {
            const response = await fetch("/embed", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    prompt: prompt
                })
            });

            if (!response.ok) {
                throw new Error(`Server returned ${response.status}`);
            }

            const data = await response.json();

            // Assuming the response looks like:
            // { "response": "some text" }
            output.textContent = data.response;
        }
        catch (err) {
            output.textContent = "Error:\n\n" + err.message;
        }
    }
</script>

</body>
</html>
